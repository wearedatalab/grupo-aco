/*──────────────────────────────────────────────
  VARIABLES Y RESET
──────────────────────────────────────────────*/
:root {
  --color-primary: #8B2500;
  --color-primary-light: #B8450A;
  --color-accent: #E87A20;
  --color-accent-light: #F5A623;
  --color-bg: #FDF6EC;
  --color-bg-card: #FFFFFF;
  --color-text: #2D1B0E;
  --color-text-light: #6B5B4F;
  --color-text-muted: #9B8B7F;
  --color-border: #E8DDD0;
  --color-price: #8B2500;
  --color-badge-new: #27AE60;
  --color-badge-popular: #E87A20;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,.1);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
  --radius: 12px;
  --radius-sm: 8px;
  --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --max-width: 800px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-main);
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/*──────────────────────────────────────────────
  HEADER
──────────────────────────────────────────────*/
.header {
  background: linear-gradient(135deg, var(--color-primary) 0%, #5C1A00 100%);
  color: #fff;
  text-align: center;
  padding: 1.8rem 1rem 1.4rem;
  position: relative;
  overflow: hidden;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0; right: 0;
  height: 20px;
  background: var(--color-bg);
  border-radius: 50% 50% 0 0 / 100% 100% 0 0;
}

.header .subtitle {
  font-size: .85rem;
  opacity: .85;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 500;
}

/*──────────────────────────────────────────────
  BUSQUEDA
──────────────────────────────────────────────*/
.search-wrap {
  max-width: var(--max-width);
  margin: -10px auto 0;
  padding: 0 1rem;
  position: relative;
  z-index: 10;
}
.search-box {
  width: 100%;
  padding: 14px 16px 14px 44px;
  border: 2px solid var(--color-border);
  border-radius: 50px;
  font-size: 1rem;
  background: #fff;
  box-shadow: var(--shadow-md);
  outline: none;
  transition: border-color .2s;
  font-family: var(--font-main);
}
.search-box:focus { border-color: var(--color-accent); }
.search-icon {
  position: absolute;
  left: 30px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--color-text-muted);
  font-size: 1.1rem;
  pointer-events: none;
}

/*──────────────────────────────────────────────
  NAVEGACION DE CATEGORIAS
──────────────────────────────────────────────*/
.cat-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--color-bg);
  border-bottom: 1px solid var(--color-border);
  padding: 0;
}
.cat-nav-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  gap: 2px;
  padding: 8px 12px;
}
.cat-nav-inner::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0;
  padding: 8px 16px;
  border: none;
  background: transparent;
  color: var(--color-text-light);
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  border-radius: 50px;
  transition: all .2s;
  white-space: nowrap;
  font-family: var(--font-main);
}
.cat-btn:hover { background: rgba(139,37,0,.08); color: var(--color-primary); }
.cat-btn.active {
  background: var(--color-primary);
  color: #fff;
}

/*──────────────────────────────────────────────
  CONTENEDOR PRINCIPAL
──────────────────────────────────────────────*/
.main {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 1rem;
}

/*──────────────────────────────────────────────
  SECCION DE CATEGORIA
──────────────────────────────────────────────*/
.menu-section {
  margin-bottom: 2rem;
}
.section-header {
  display: flex;
  align-items: center;
  gap: .7rem;
  margin-bottom: 1rem;
  padding-bottom: .5rem;
  border-bottom: 2px solid var(--color-accent);
}
.section-icon { font-size: 1.5rem; }
.section-title {
  font-size: 1.35rem;
  font-weight: 800;
  color: var(--color-primary);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.section-subtitle {
  font-size: .8rem;
  color: var(--color-text-muted);
  margin-top: -0.5rem;
  margin-bottom: 1rem;
  font-style: italic;
}

/*──────────────────────────────────────────────
  TARJETA DE PRODUCTO
──────────────────────────────────────────────*/
.menu-item {
  background: var(--color-bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  margin-bottom: .75rem;
  overflow: hidden;
  transition: box-shadow .2s;
}
.menu-item:hover { box-shadow: var(--shadow-md); }
.item-main {
  display: flex;
  padding: 1rem;
  gap: .9rem;
  cursor: pointer;
  align-items: flex-start;
}
.item-img {
  width: 75px;
  height: 75px;
  border-radius: var(--radius-sm);

  flex-shrink: 0;
  background: #f0e6d8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  overflow: hidden;
  position: relative;
}
.item-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
}
.item-info { flex: 1; min-width: 0; }
.item-name-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: .5rem;
}
.item-name {
  font-size: .95rem;
  font-weight: 700;
  color: var(--color-text);
  line-height: 1.3;
}
.item-price {
  font-size: 1rem;
  font-weight: 800;
  color: var(--color-price);
  white-space: nowrap;
  flex-shrink: 0;
}
.item-desc {
  font-size: .78rem;
  color: var(--color-text-light);
  margin-top: 3px;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.item-badges {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.badge {
  font-size: .65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 50px;
  text-transform: uppercase;
  letter-spacing: .3px;

.badge-new { background: #E8F8EE; color: #1B7A3D; }
.badge-popular { background: #FFF3E0; color: #BF6D0A; }
.badge-spicy { background: #FDECEA; color: #C62828; }

/* Allergen tags */
.allergen-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.allergen-tag {
  font-size: .6rem;
  padding: 1px 6px;
  border-radius: 50px;
  background: #F5F0EB;
  color: var(--color-text-muted);

}

.item-detail {

  margin-top: 0;
}
.item-detail.open { display: block; }
.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  font-size: .82rem;
}
.detail-label { color: var(--color-text-light); }
.detail-value { font-weight: 600; }
.allergen-info {

  padding: 8px 12px;
  background: #FFF8E1;
  border-radius: var(--radius-sm);
  font-size: .78rem;
  color: #8D6E00;
}
.allergen-info strong { color: #6D5000; }

/*──────────────────────────────────────────────
  INFO BOX (acompañamientos, términos, etc.)
──────────────────────────────────────────────*/
.info-box {

  border-radius: var(--radius-sm);
  padding: 1rem;
  margin-bottom: 1rem;
  font-size: .85rem;
}
.info-box h4 {
  color: var(--color-primary);
  margin-bottom: .4rem;
  font-size: .9rem;
}
.info-box ul {
  list-style: none;
  columns: 2;
  gap: .3rem;
}
.info-box li::before { content: '• '; color: var(--color-accent); font-weight: bold; }
.info-box li { font-size: .8rem; color: var(--color-text-light); break-inside: avoid; }

/*──────────────────────────────────────────────
  COMBOS / KITS
──────────────────────────────────────────────*/
.kit-card {
  background: linear-gradient(135deg, var(--color-primary) 0%, #5C1A00 100%);
  color: #fff;
  border-radius: var(--radius);
  padding: 1.2rem;
  margin-bottom: .75rem;
}
.kit-card .item-name { color: #fff; }
.kit-card .item-price { color: var(--color-accent-light); font-size: 1.2rem; }

  font-size: .75rem;
  opacity: .9;

  display: inline-block;
  background: rgba(255,255,255,.15);
  padding: 2px 8px;
  border-radius: 50px;
  margin: 2px 2px;

/*──────────────────────────────────────────────
  NO RESULTADOS
──────────────────────────────────────────────*/
.no-results {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--color-text-muted);
}
.no-results .icon { font-size: 3rem; margin-bottom: .5rem; }
.no-results p { font-size: .95rem; }

/*──────────────────────────────────────────────
  LEYENDA DE ALERGENOS
──────────────────────────────────────────────*/
.allergen-legend {
  background: #fff;
  border-radius: var(--radius);
  padding: 1rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow-sm);

.allergen-legend h3 {
  font-size: .9rem;
  color: var(--color-primary);
  margin-bottom: .5rem;
}
.legend-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 6px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .75rem;
  color: var(--color-text-light);
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/*──────────────────────────────────────────────
  FOOTER
──────────────────────────────────────────────*/
.footer {
  text-align: center;
  padding: 2rem 1rem;
  color: var(--color-text-muted);
  font-size: .75rem;
  border-top: 1px solid var(--color-border);
  margin-top: 2rem;
}
.footer a { color: var(--color-primary); text-decoration: none; }
.footer .phone { font-size: 1.1rem; font-weight: 700; color: var(--color-primary); display: block; margin: .5rem 0; }

/*──────────────────────────────────────────────
  SCROLL TO TOP
──────────────────────────────────────────────*/
.scroll-top {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--color-primary);
  color: #fff;
  border: none;
  font-size: 1.2rem;
  cursor: pointer;
  box-shadow: var(--shadow-md);
  opacity: 0;
  transform: translateY(20px);
  transition: all .3s;
  z-index: 50;
}
.scroll-top.visible { opacity: 1; transform: translateY(0); }

/*──────────────────────────────────────────────
  RESPONSIVE
──────────────────────────────────────────────*/
@media (max-width: 480px) {
  .header h1 { font-size: 1.5rem; }
  .item-img { width: 60px; height: 60px; }
  .item-name { font-size: .88rem; }
  .info-box ul { columns: 1; }
}
@media (min-width: 600px) {
  .header h1 { font-size: 2.5rem; }
  .item-main { padding: 1.1rem 1.2rem; }
}

/* Print styles */
@media print {
  .cat-nav, .search-wrap, .scroll-top { display: none; }
  .menu-item { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
}
</style>

function getItemImg(item, catId) {
  const name = (item.nombre||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  for(const [kw,img] of FOOD_IMAGES.kw) {
    if(name.includes(kw.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase())) return UNSPLASH+img+'?w=200&h=200&fit=crop&q=60';
  }
  const ci = FOOD_IMAGES.cat[catId];
  return ci ? UNSPLASH+ci+'?w=200&h=200&fit=crop&q=60' : null;
}

/*══════════════════════════════════════════════
  FUNCIONES DEL MENÚ - NO EDITAR DEBAJO
══════════════════════════════════════════════*/

function normalize(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function formatPrice(precio) {
  return '$' + precio.toLocaleString('es-CO');
}

function buildAllergenTags(alergenos) {
  if (!alergenos || !alergenos.length) return '';
  return '<div class="allergen-tags">' +
    alergenos.map(a => {
      const cfg = ALLERGEN_CONFIG[a];
      if (!cfg) return '';
      return `<span class="allergen-tag" style="border-color:${cfg.color}">${cfg.icon} ${cfg.label}</span>`;
    }).join('') + '</div>';
}

function buildBadges(tags) {
  if (!tags || !tags.length) return '';
  const map = {
    nuevo: { cls: 'badge-new', label: 'Nuevo' },
    popular: { cls: 'badge-popular', label: 'Popular' },
    picante: { cls: 'badge-spicy', label: 'Picante' }
  };
  return tags.map(t => {
    const m = map[t];
    return m ? `<span class="badge ${m.cls}">${m.label}</span>` : '';
  }).join('');
}

function buildItemHTML(item, catId) {
  const badges = buildBadges(item.tags);
  const allergens = buildAllergenTags(item.alergenos);
  const imgUrl = getItemImg(item, catId);
  const imgContent = imgUrl
    ? `<img src="${imgUrl}" alt="${item.nombre}" loading="lazy" onerror="this.remove()">${item.icono || '🍽️'}`
    : (item.icono || '🍽️');
  return `
    <div class="menu-item" data-name="${normalize(item.nombre)}" data-desc="${normalize(item.desc||'')}">
      <div class="item-main" onclick="this.nextElementSibling.classList.toggle('open')">
        <div class="item-img">${imgContent}</div>
        <div class="item-info">
          <div class="item-name-row">
            <span class="item-name">${item.nombre}</span>
            <span class="item-price">${formatPrice(item.precio)}</span>
          </div>
          <div class="item-desc">${item.desc || ''}</div>
          <div class="item-badges">
            ${badges}
            ${allergens}
          </div>
        </div>
      </div>
      <div class="item-detail">
        ${item.peso ? `<div class="detail-row"><span class="detail-label">Peso</span><span class="detail-value">${item.peso}</span></div>` : ''}
        <div class="detail-row"><span class="detail-label">Precio</span><span class="detail-value">${formatPrice(item.precio)}</span></div>
        ${item.alergenos && item.alergenos.length ? `<div class="allergen-info"><strong>Alérgenos:</strong> ${item.alergenos.map(a => ALLERGEN_CONFIG[a] ? ALLERGEN_CONFIG[a].icon + ' ' + ALLERGEN_CONFIG[a].label : a).join(', ')}</div>` : '<div class="allergen-info" style="background:#E8F5E9;color:#2E7D32"><strong>Sin alérgenos declarados</strong></div>'}
      </div>
    </div>`;
}

function buildSectionHTML(cat) {
  let html = `<section class="menu-section" id="section-${cat.id}">
    <div class="section-header">
      <span class="section-icon">${cat.icono}</span>
      <h2 class="section-title">${cat.nombre}</h2>
    </div>`;
  if (cat.descripcion) {
    html += `<p class="section-subtitle">${cat.descripcion}</p>`;
  }
  // Info boxes for special sections
  if (cat.id === 'parrilla-res') {
    html += `<div class="info-box">
      <h4>3 Acompañamientos Tradicionales Incluidos</h4>
      <ul>
        <li>Arroz Leños</li><li>Ensalada de la casa</li>
        <li>Papa cocida</li><li>Plátano maduro</li>
        <li>2 arepas de maíz</li>
      </ul>
      <p style="margin-top:.5rem;font-size:.78rem"><strong>Especial +$2,000:</strong> Papa arrugada, papa en cascos, mazorca asada o vegetales al wok</p>
    </div>
    <div class="info-box">
      <h4>Términos de Cocción</h4>
      <ul><li>Azul</li><li>Medio</li><li>Tres Cuartos</li><li>Bien Cocido</li></ul>
    </div>`;
  }
  html += cat.items.map(item => buildItemHTML(item, cat.id)).join('');
  html += '</section>';
  return html;
}

function renderMenu(data) {
  const container = document.getElementById('menuContainer');
  // Allergen legend
  let legend = `<div class="allergen-legend">
    <h3>Información de Alérgenos</h3>
    <div class="legend-grid">
      ${Object.entries(ALLERGEN_CONFIG).map(([k, v]) =>
        `<div class="legend-item"><span class="legend-dot" style="background:${v.color}"></span>${v.icon} ${v.label}</div>`
      ).join('')}
    </div>
    <p style="font-size:.72rem;color:var(--color-text-muted);margin-top:.5rem">Toca cada producto para ver sus alérgenos detallados. Si tienes alguna alergia, informa a nuestro personal.</p>
  </div>`;
  container.innerHTML = legend + data.map(buildSectionHTML).join('');
}

function renderNav(data) {
  const nav = document.getElementById('catNavInner');
  nav.innerHTML = data.map(cat =>
    `<button class="cat-btn" data-cat="${cat.id}">${cat.icono} ${cat.nombre}</button>`
  ).join('');
}

// Category navigation
document.getElementById('catNavInner').addEventListener('click', (e) => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const section = document.getElementById('section-' + btn.dataset.cat);
  if (section) {
    const navHeight = document.getElementById('catNav').offsetHeight;
    const top = section.getBoundingClientRect().top + window.scrollY - navHeight - 10;
    window.scrollTo({ top, behavior: 'smooth' });
  }
});

// Search
let searchTimer;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = normalize(e.target.value.trim());
    const items = document.querySelectorAll('.menu-item');
    const sections = document.querySelectorAll('.menu-section');
    if (!q) {
      items.forEach(i => i.style.display = '');
      sections.forEach(s => s.style.display = '');
      document.getElementById('noResults')?.remove();
      return;
    }
    let visible = 0;
    items.forEach(item => {
      const match = item.dataset.name.includes(q) || item.dataset.desc.includes(q);
      item.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    sections.forEach(sec => {
      const hasVisible = sec.querySelectorAll('.menu-item:not([style*="display: none"])').length > 0;
      sec.style.display = hasVisible ? '' : 'none';
    });
    document.getElementById('noResults')?.remove();
    if (visible === 0) {
      const nr = document.createElement('div');
      nr.id = 'noResults';
      nr.className = 'no-results';
      nr.innerHTML = '<div class="icon">🔍</div><p>No se encontraron resultados para "<strong>' + q + '</strong>"</p><p style="margin-top:.3rem;font-size:.85rem">Intenta con otro término</p>';
      document.getElementById('menuContainer').appendChild(nr);
    }
  }, 200);
});

// Scroll to top
const scrollBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', () => {
  scrollBtn.classList.toggle('visible', window.scrollY > 500);
  // Active category highlight
  const navHeight = document.getElementById('catNav').offsetHeight;
  const sections = document.querySelectorAll('.menu-section');
  let current = '';
  sections.forEach(sec => {
    if (sec.getBoundingClientRect().top <= navHeight + 60) {
      current = sec.id.replace('section-', '');
    }
  });
  if (current) {
    document.querySelectorAll('.cat-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === current);
      if (b.dataset.cat === current) {
        b.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    });
  }
}, { passive: true });

scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// Initialize
renderNav(MENU_DATA);
renderMenu(MENU_DATA);
</script>
